app    = "contextmesh-api"
primary_region = "ams"

[build]
  dockerfile    = "api/Dockerfile"
  build-context = "api"

[env]
  PORT            = "8080"
  WORKERS         = "2"
  CONTEXTMESH_ENV = "production"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"

[[mounts]]
  source      = "contextmesh_embed_cache"
  destination = "/tmp/cm_embed_cache"

[deploy]
  strategy     = "rolling"
  wait_timeout = "120s"